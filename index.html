<body>
<div id="passwordScreen" style="display:none"><div class="app"><div class="setup-box" style="text-align:center"><h2>🔒 Tour Booking Manager</h2><p>Enter the password to access the dashboard.</p><div class="fg" style="text-align:left"><label>Password</label><input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPassword()"></div><div style="margin-top:16px"><button class="btn btn-primary" onclick="checkPassword()" style="width:100%">Log in</button></div><p id="pwError" style="color:var(--status-cancelled);margin-top:12px;display:none">Incorrect password</p></div></div></div>

<script>
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const TL={hotel:'Hotel',activity:'Activity',restaurant:'Restaurant',transport:'Transport',etc:'Other'};
const SL={confirmed:'Confirmed',pending:'Pending',progress:'In Progress',cancelled:'Cancelled'};
const TYPE_KEYS=Object.keys(TL),STATUS_KEYS=Object.keys(SL);
const SITE_PASSWORD='Hokkaido2025@';
const DSVG={linked:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" stroke="#2D6A4F" stroke-width="2" fill="#D8F3DC"/></svg>',unlinked:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" stroke="currentColor" stroke-width="2" opacity=".5"/></svg>'};
const ISVG='<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="2"/></svg>';
let db=null,groups=[],openGroups=new Set(),showPast=false;
function todayStr(){return new Date().toISOString().split('T')[0]}
function fmtDate(s){if(!s)return'-';const dt=new Date(s+'T00:00:00');return`${MONTHS[dt.getMonth()]} ${dt.getDate()} (${DAYS[dt.getDay()]})`}
function fmtMonth(y,m){return`${MONTHS[m]} ${y}`}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function isGroupPast(g){return g.end_date&&g.end_date<todayStr()}
function isGroupCancelled(g){return g.items&&g.items.length>0&&g.items.every(i=>i.status==='cancelled')}

function checkPassword(){const pw=document.getElementById('pwInput').value;if(pw===SITE_PASSWORD){sessionStorage.setItem('pw_ok','1');document.getElementById('passwordScreen').style.display='none';document.getElementById('pwError').style.display='none';initApp()}else{document.getElementById('pwError').style.display='block';document.getElementById('pwInput').value='';document.getElementById('pwInput').focus()}}

async function connectSupabase(){const url=document.getElementById('cfgUrl').value.trim(),key=document.getElementById('cfgKey').value.trim();if(!url||!key){showCfgError('Please enter both URL and Key.');return}try{db=window.supabase.createClient(url,key);const{error}=await db.from('groups').select('id').limit(1);if(error)throw error;localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);document.getElementById('setupScreen').style.display='none';document.getElementById('mainApp').style.display='block';setSyncStatus(true);await loadAll();subscribeRealtime()}catch(e){showCfgError('Connection failed: '+e.message)}}
function showCfgError(msg){const el=document.getElementById('cfgError');el.textContent=msg;el.style.display='block'}
function setSyncStatus(online){const b=document.getElementById('syncBadge');b.className='sync-badge '+(online?'online':'offline');b.innerHTML=`<span class="sync-dot ${online?'online':'offline'}"></span><span>${online?'Live':'Offline'}</span>`}
function subscribeRealtime(){db.channel('all-changes').on('postgres_changes',{event:'*',schema:'public',table:'groups'},()=>loadAll()).on('postgres_changes',{event:'*',schema:'public',table:'items'},()=>loadAll()).subscribe()}
async function loadAll(){const{data:gs}=await db.from('groups').select('*').order('id');const{data:its}=await db.from('items').select('*').order('id');groups=(gs||[]).map(g=>({...g,items:(its||[]).filter(i=>i.group_id===g.id)}));render()}
async function checkDriveLinks(){
  const fileIds=[];const linkMap={};
  for(const g of groups){
    if(g.drive_link){const m=g.drive_link.match(/folders\/([a-zA-Z0-9_-]+)/);if(m){fileIds.push(m[1]);linkMap[m[1]]={type:'group',id:g.id}}}
    for(const it of(g.items||[])){
      if(it.upload_folder_link){const m=it.upload_folder_link.match(/folders\/([a-zA-Z0-9_-]+)/);if(m){fileIds.push(m[1]);linkMap[m[1]]={type:'upload',id:it.id}}}
      if(it.invoice_link){const m=it.invoice_link.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m){fileIds.push(m[1]);linkMap[m[1]]={type:'invoice',id:it.id}}}
    }
  }
  if(!fileIds.length)return;
  try{
    const res=await fetch('/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileIds})});
    if(!res.ok){console.warn('Check API error:',res.status);return}
    const data=await res.json();
    const results=data.results||{};
    let changed=false;
    for(const[fid,valid]of Object.entries(results)){
      if(!valid&&linkMap[fid]){
        const info=linkMap[fid];
        if(info.type==='group'){await db.from('groups').update({drive_link:null}).eq('id',info.id);changed=true}
        else if(info.type==='upload'){await db.from('items').update({upload_folder_link:null}).eq('id',info.id);changed=true}
        else if(info.type==='invoice'){await db.from('items').update({invoice_link:null}).eq('id',info.id);changed=true}
      }
    }
    if(changed)await loadAll();
  }catch(e){console.warn('Drive link check failed:',e)}
}
async function dbUpdateGroup(id,data){await db.from('groups').update(data).eq('id',id)}
async function dbDeleteGroup(id){await db.from('groups').delete().eq('id',id)}
async function dbInsertItem(data){await db.from('items').insert(data)}
async function dbUpdateItem(id,data){await db.from('items').update(data).eq('id',id)}
async function dbDeleteItem(id){await db.from('items').delete().eq('id',id)}
async function dbUpdateAllItems(gid,data){await db.from('items').update(data).eq('group_id',gid)}
function initApp(){const savedUrl=localStorage.getItem('sb_url'),savedKey=localStorage.getItem('sb_key');if(savedUrl&&savedKey){document.getElementById('mainApp').style.display='block';document.getElementById('pageTitle').innerHTML='Tour Booking Manager <span>'+MONTHS[new Date().getMonth()]+' '+new Date().getDate()+', '+new Date().getFullYear()+'</span>';db=window.supabase.createClient(savedUrl,savedKey);setSyncStatus(true);loadAll().then(()=>{subscribeRealtime();checkDriveLinks();setInterval(checkDriveLinks,30000)})}else{document.getElementById('setupScreen').style.display='block'}}

function activeItems(){return groups.filter(g=>!isGroupPast(g)).flatMap(g=>(g.items||[]))}
function renderStats(){const items=activeItems(),active=items.filter(i=>i.status!=='cancelled'),pend=items.filter(i=>i.status==='pending').length,pastCount=groups.filter(g=>isGroupPast(g)).length;document.getElementById('stats').innerHTML=`<div class="stat"><div class="stat-label"><span class="stat-dot" style="background:var(--text-primary)"></span>Active Groups</div><div class="stat-val">${groups.filter(g=>!isGroupPast(g)).length}</div><div class="stat-sub">${active.length} bookings · ${pend} pending</div></div>${TYPE_KEYS.map(tp=>{const c=active.filter(i=>i.type===tp).length;return`<div class="stat"><div class="stat-label"><span class="stat-dot" style="background:var(--accent-${tp})"></span>${TL[tp]}</div><div class="stat-val">${c}</div><div class="stat-sub">total ${items.filter(i=>i.type===tp).length}</div></div>`}).join('')}`;document.getElementById('pastCount').textContent=pastCount>0?pastCount:''}
function updateMonthFilter(){const mf=document.getElementById('monthFilter'),cur=mf.value,months=new Set();groups.forEach(g=>{if(g.start_date)months.add(g.start_date.substring(0,7));if(g.end_date)months.add(g.end_date.substring(0,7))});mf.innerHTML='<option value="all">All Months</option>'+[...months].sort().map(m=>{const[y,mo]=m.split('-');return`<option value="${m}"${m===cur?' selected':''}>${MONTHS[parseInt(mo)-1]} ${y}</option>`}).join('')}
function getFiltered(){let list=[...groups];const q=document.getElementById('searchInput').value.trim().toLowerCase();if(q)list=list.filter(g=>g.name.toLowerCase().includes(q)||g.contact.toLowerCase().includes(q)||(g.items||[]).some(i=>i.venue.toLowerCase().includes(q)));const sf=document.getElementById('statusFilter').value;if(sf==='has-pending')list=list.filter(g=>(g.items||[]).some(i=>i.status==='pending'));if(sf==='all-confirmed')list=list.filter(g=>g.items&&g.items.length>0&&g.items.every(i=>i.status==='confirmed'));if(sf==='has-cancelled')list=list.filter(g=>(g.items||[]).some(i=>i.status==='cancelled'));const mf=document.getElementById('monthFilter').value;if(mf!=='all')list=list.filter(g=>g.start_date&&(g.start_date.substring(0,7)===mf||(g.end_date||'').substring(0,7)===mf));const[field,dir]=(document.getElementById('sortOrder').value||'start-asc').split('-');list.sort((a,b)=>{let va,vb;if(field==='start'){va=a.start_date||'';vb=b.start_date||''}else if(field==='end'){va=a.end_date||'';vb=b.end_date||''}else if(field==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase()}else if(field==='created'){va=a.id;vb=b.id}else{va=a.start_date||'';vb=b.start_date||''}if(va<vb)return dir==='asc'?-1:1;if(va>vb)return dir==='asc'?1:-1;return 0});return{activeList:list.filter(g=>!isGroupPast(g)),pastList:list.filter(g=>isGroupPast(g))}}
function render(){renderStats();updateMonthFilter();const{activeList,pastList}=getFiltered();const el=document.getElementById('groupList');if(!activeList.length&&(!showPast||!pastList.length)){el.innerHTML='<div class="empty"><div style="font-size:32px;opacity:.3;margin-bottom:6px">📋</div><p>No groups to display</p></div>';return}let html=activeList.map(g=>renderGroupCard(g,false)).join('');if(showPast&&pastList.length){html+=`<div class="past-divider"><span>Past Tours (${pastList.length})</span></div>`;html+=pastList.map(g=>renderGroupCard(g,true)).join('')}el.innerHTML=html;document.getElementById('pastToggle').classList.toggle('active',showPast);document.getElementById('pastToggleLabel').textContent=showPast?'Hide Past Tours':'Show Past Tours'}

<td style="white-space:nowrap"><span class="editable" onclick="event.stopPropagation();inlineEditItemDate(${g.id},${i.id},'start_date',this)">${fmtDate(i.start_date)}</span>${i.start_date!==i.end_date?` ~ <span class="editable end-date-edit" data-iid="${i.id}" onclick="event.stopPropagation();inlineEditItemDate(${g.id},${i.id},'end_date',this)">${fmtDate(i.end_date)}</span>`:`<button class="range-toggle end-date-edit" data-iid="${i.id}" onclick="event.stopPropagation();inlineEditItemDate(${g.id},${i.id},'end_date',this)" title="Add end date">~+</button>`}${i.type!=='hotel'?`<div class="time-info ${i.time?'has-time':''}"><span class="editable time-edit" onclick="event.stopPropagation();inlineEditItem(${g.id},${i.id},'time',this)">${esc(i.time||'Set time')}</span></div>`:''}</td>

function editPrice(gid,iid,idx,el){
  const g=groups.find(x=>x.id===gid);if(!g)return;
  const it=(g.items||[]).find(x=>x.id===iid);if(!it)return;
  const prices=it.prices||[it.price||''];
  const input=document.createElement('input');input.className='inline-input';input.type='text';input.value=prices[idx]||'';input.style.width='80px';
  const orig=el.innerHTML;el.innerHTML='';el.appendChild(input);input.focus();
  const commit=async()=>{
    prices[idx]=input.value.trim();
    const cleaned=prices.filter(p=>p!=='');
    await dbUpdateItem(iid,{prices:cleaned,price:cleaned.join(', ')});
    await loadAll();
  };
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape'){el.innerHTML=orig;input.removeEventListener('blur',commit)}});
}
async function addPrice(gid,iid){
  const g=groups.find(x=>x.id===gid);if(!g)return;
  const it=(g.items||[]).find(x=>x.id===iid);if(!it)return;
  const prices=it.prices||[it.price||''];
  prices.push('');
  await dbUpdateItem(iid,{prices});
  await loadAll();
}

function inlineEditItem(gid,iid,field,el,type){const g=groups.find(x=>x.id===gid);if(!g)return;const it=(g.items||[]).find(x=>x.id===iid);if(!it)return;let val=it[field]||'';if(type==='number')val=it[field]||0;const input=document.createElement('input');input.className='inline-input';input.type=type||'text';input.value=val;if(type==='number'){input.min='0';input.style.width='60px'}const orig=el.innerHTML;el.innerHTML='';el.appendChild(input);input.focus();let committed=false;const commit=async()=>{if(committed)return;committed=true;let v=input.value.trim();if(type==='number')v=parseInt(v)||0;if(v===''&&field==='venue'){el.innerHTML=orig;return}await dbUpdateItem(iid,{[field]:v});await loadAll()};let composing=false;input.addEventListener('compositionstart',()=>{composing=true});input.addEventListener('compositionend',()=>{composing=false});input.addEventListener('blur',()=>{if(composing){setTimeout(commit,50)}else{commit()}});input.addEventListener('keydown',e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape'){el.innerHTML=orig;committed=true}})}function inlineEditItemDate(gid,iid,field,el){const g=groups.find(x=>x.id===gid);if(!g)return;const it=(g.items||[]).find(x=>x.id===iid);if(!it)return;const minDate=field==='end_date'?it.start_date:null;const defaultDate=it[field]||g.start_date||todayStr();openCal(el,defaultDate,async function(val){await dbUpdateItem(iid,{[field]:val});await loadAll();if(field==='start_date'&&it.type==='hotel'){setTimeout(()=>{const row=document.querySelector(`[data-gid="${gid}"] .item-table tbody`);if(!row)return;const endEl=row.querySelector(`.end-date-edit[data-iid="${iid}"]`);if(endEl)inlineEditItemDate(gid,iid,'end_date',endEl)},200)}},minDate,g.start_date,g.end_date)}
function inlineEditGroup(gid,field,el,type){const g=groups.find(x=>x.id===gid);if(!g)return;let val=g[field]||'';if(type==='number')val=g[field]||0;const input=document.createElement('input');input.className='inline-input';input.type=type||'text';input.value=val;if(type==='number'){input.min='1';input.style.width='60px'}if(field==='name')input.style.width='280px';const orig=el.innerHTML;el.innerHTML='';el.appendChild(input);input.focus();let committed=false;const commit=async()=>{if(committed)return;committed=true;let v=input.value.trim();if(type==='number')v=parseInt(v)||1;if(v===''&&field==='name'){el.innerHTML=orig;return}await dbUpdateGroup(gid,{[field]:v});await loadAll()};let composing=false;input.addEventListener('compositionstart',()=>{composing=true});input.addEventListener('compositionend',()=>{composing=false});input.addEventListener('blur',()=>{if(composing){setTimeout(commit,50)}else{commit()}});input.addEventListener('keydown',e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape'){el.innerHTML=orig;committed=true}})}function inlineEditGroupDate(gid,field,el){const g=groups.find(x=>x.id===gid);if(!g)return;const minDate=field==='end_date'?g.start_date:null;openCal(el,g[field]||todayStr(),async function(val){await dbUpdateGroup(gid,{[field]:val});await loadAll()},minDate)}

function closePicker(){document.getElementById('floatingPicker').classList.remove('open');document.getElementById('pickerBackdrop').style.display='none'}
function openStatusPicker(ev,gid,iid){
  const fp=document.getElementById('floatingPicker');
  fp.innerHTML=STATUS_KEYS.map(s=>`<button class="${s}" onclick="event.stopPropagation();pickField(${gid},${iid},'status','${s}')"><span class="status-dot dot-${s}"></span>${SL[s]}</button>`).join('');
  const rect=ev.currentTarget.getBoundingClientRect();
  let top=rect.bottom+4,left=rect.left;
  if(left+140>window.innerWidth)left=window.innerWidth-150;
  if(left<8)left=8;
  fp.style.top=top+'px';fp.style.left=left+'px';fp.style.transform='';
  document.getElementById('pickerBackdrop').style.display='block';
  fp.classList.add('open');
}
function openTypePicker(ev,gid,iid){
  const fp=document.getElementById('floatingPicker');
  fp.innerHTML=TYPE_KEYS.map(tp=>`<button onclick="event.stopPropagation();pickField(${gid},${iid},'type','${tp}')"><span class="tag tag-${tp}">${TL[tp]}</span></button>`).join('');
  const rect=ev.currentTarget.getBoundingClientRect();
  let top=rect.bottom+4,left=rect.left;
  if(left+140>window.innerWidth)left=window.innerWidth-150;
  if(left<8)left=8;
  fp.style.top=top+'px';fp.style.left=left+'px';fp.style.transform='';
  document.getElementById('pickerBackdrop').style.display='block';
  fp.classList.add('open');
}
async function pickField(gid,iid,field,val){closePicker();await dbUpdateItem(iid,{[field]:val});await loadAll();if(field==='status'){const g=groups.find(x=>x.id===gid);const it=(g&&g.items||[]).find(x=>x.id===iid);renameFolderOnStatusChange(g,it,null,val)}}

let calCb=null,calMonth=null,calYear=null,calSelected=null,calMinDate=null,calRangeStart=null,calRangeEnd=null;
function openCal(anchor,currentVal,callback,minDate,rangeStart,rangeEnd){closePicker();calCb=callback;calMinDate=minDate||null;calRangeStart=rangeStart||null;calRangeEnd=rangeEnd||null;const showDate=minDate||currentVal;const dt=new Date(showDate+'T00:00:00');calMonth=dt.getMonth();calYear=dt.getFullYear();calSelected=currentVal;const popup=document.getElementById('calPopup');if(window.innerWidth<=700){popup.style.top='50%';popup.style.left='50%';popup.style.transform='translate(-50%,-50%)'}else{const rect=anchor.getBoundingClientRect();let top=rect.bottom+6,left=rect.left;if(top+320>window.innerHeight)top=rect.top-320;if(left+280>window.innerWidth)left=window.innerWidth-290;if(left<8)left=8;popup.style.top=top+'px';popup.style.left=left+'px';popup.style.transform=''}document.getElementById('calBackdrop').style.display='block';renderCal();requestAnimationFrame(()=>popup.classList.add('open'))}
function closeCal(){document.getElementById('calPopup').classList.remove('open');document.getElementById('calBackdrop').style.display='none';calCb=null}

/* ─── Google Drive Upload (Server-side via /api/upload) ─── */
function getDriveFolders(){try{return JSON.parse(localStorage.getItem('drive_folders')||'[]')}catch(e){return[]}}
function saveDriveFolders(list){localStorage.setItem('drive_folders',JSON.stringify(list))}

async function uploadToServer(files,folderPath,parentFolderId,groupMatchName){
  const formData=new FormData();
  for(const file of files){formData.append('file',file)}
  formData.append('folderPath',JSON.stringify(folderPath));
  if(parentFolderId)formData.append('parentFolderId',parentFolderId);
  if(groupMatchName)formData.append('groupMatchName',groupMatchName);
  const res=await fetch('/api/upload',{method:'POST',body:formData});
  if(!res.ok){const err=await res.json();throw new Error(err.error||'Upload failed')}
  return await res.json();
}

function addDriveFolder(){
  const name=document.getElementById('dfName').value.trim();
  const url=document.getElementById('dfUrl').value.trim();
  if(!name||!url){customAlert('Please enter both name and URL.');return}
  let folderId='';
  const match=url.match(/folders\/([a-zA-Z0-9_-]+)/);
  if(match)folderId=match[1]; else folderId=url;
  const folders=getDriveFolders();
  folders.push({name,id:folderId});
  saveDriveFolders(folders);
  setDriveFolder();
}
function removeDriveFolder(idx){
  const folders=getDriveFolders();
  folders.splice(idx,1);
  saveDriveFolders(folders);
  setDriveFolder();
}
let folderChoiceResolve=null;
function chooseDriveFolder(){
  return new Promise(resolve=>{
    const folders=getDriveFolders();
    if(folders.length===0){resolve(null);return}
    if(folders.length===1){resolve(folders[0].id);return}
    folderChoiceResolve=resolve;
    const c=document.getElementById('promptContainer');
    c.innerHTML=`<div class="prompt-overlay"><div class="prompt-box"><h3>Select upload folder</h3><div style="margin-top:12px">${folders.map((f,i)=>`<button class="btn btn-secondary" style="width:100%;margin-bottom:8px;justify-content:flex-start" onclick="pickDriveFolder(${i})">${esc(f.name)}</button>`).join('')}</div><div class="prompt-btns" style="margin-top:10px"><button class="btn btn-secondary btn-sm" onclick="pickDriveFolder(-1)"><span class="cancel-label">Cancel</span><span class="cancel-icon">⦸</span></button></div></div></div>`;
  });
}
function pickDriveFolder(idx){
  document.getElementById('promptContainer').innerHTML='';
  if(folderChoiceResolve){
    if(idx<0)folderChoiceResolve(null);
    else{const folders=getDriveFolders();folderChoiceResolve(folders[idx].id)}
    folderChoiceResolve=null;
  }
}

function getGroupFolderName(g){
  const s=g.start_date||'';
  const e=g.end_date||'';
  const startFmt=s.replace(/-/g,'');
  const endFmt=e?e.substring(5).replace(/-/g,''):'';
  return `${startFmt}_${endFmt} ${g.name}`.replace(/[\/\\:*?"<>|]/g,'_');
}

const CATEGORY_FOLDERS={hotel:'ホテル',activity:'アクティビティ',restaurant:'レストラン',transport:'交通',etc:'その他'};

function getItemFolderName(item){
  const s=item.start_date||'';
  const e=item.end_date||'';
  const startFmt=s.replace(/-/g,'');
  if(item.type==='hotel'){
    const startDt=new Date(s+'T00:00:00');
    const endDt=new Date(e+'T00:00:00');
    const nights=Math.max(1,Math.round((endDt-startDt)/(1000*60*60*24)));
    return `${startFmt}_${nights}泊 ${item.venue}`.replace(/[\/\\:*?"<>|]/g,'_');
  }
  const endFmt=e&&e!==s?'_'+e.substring(5).replace(/-/g,''):'';
  return `${startFmt}${endFmt} ${item.venue}`.replace(/[\/\\:*?"<>|]/g,'_');
}

async function getParentFolderId(g,gid){
  const folders=getDriveFolders();
  if(folders.length>1){
    const parentId=await chooseDriveFolder();
    if(parentId===null)return null;
    return {id:parentId,isGroupFolder:false};
  }else if(folders.length===1){
    return {id:folders[0].id,isGroupFolder:false};
  }
  if(g.drive_link){
    const match=g.drive_link.match(/folders\/([a-zA-Z0-9_-]+)/);
    if(match)return {id:match[1],isGroupFolder:true};
  }
  return {id:null,isGroupFolder:false};
}

function handleDrop(event,gid,iid){
  const files=event.dataTransfer.files;
  if(!files.length)return;
  uploadFiles(gid,iid,files);
}

async function handleInvoiceDrop(event,gid,iid){
  const files=event.dataTransfer.files;
  if(!files.length)return;
  const g=groups.find(x=>x.id===gid);if(!g)return;
  const it=(g.items||[]).find(x=>x.id===iid);if(!it)return;
  try{
    const parent=await getParentFolderId(g,gid);
    if(parent===null)return;
    const categoryName=CATEGORY_FOLDERS[it.type]||'その他';
    const itemFolderName=getItemFolderName(it);
    const folderPath=parent.isGroupFolder?[categoryName,itemFolderName]:[getGroupFolderName(g),categoryName,itemFolderName];
    const result=await uploadToServer(Array.from(files),folderPath,parent.id,parent.isGroupFolder?null:g.name);
    if(result.success){
      if(!g.drive_link){
        const groupLink='https://drive.google.com/drive/folders/'+result.folderId;
        await dbUpdateGroup(gid,{drive_link:groupLink});
      }
      const lastFile=result.files[result.files.length-1];
      if(lastFile)await dbUpdateItem(iid,{invoice_link:lastFile.link});
      customAlert('Invoice uploaded.');
      await loadAll();
    }
  }catch(e){customAlert('Upload failed: '+e.message)}
}

async function uploadInvoice(gid,iid){
  const g=groups.find(x=>x.id===gid);if(!g)return;
  const it=(g.items||[]).find(x=>x.id===iid);if(!it)return;
  const input=document.createElement('input');
  input.type='file';input.multiple=false;
  input.onchange=async()=>{
    if(!input.files.length)return;
    try{
      const parent=await getParentFolderId(g,gid);
      if(parent===null)return;
      const categoryName=CATEGORY_FOLDERS[it.type]||'その他';
      const itemFolderName=getItemFolderName(it);
      const folderPath=parent.isGroupFolder?[categoryName,itemFolderName]:[getGroupFolderName(g),categoryName,itemFolderName];
      const result=await uploadToServer(Array.from(input.files),folderPath,parent.id,parent.isGroupFolder?null:g.name);

async function renameFolderOnStatusChange(g,it,prevStatus,newStatus){
  if(!it||!it.upload_folder_link)return;
  const match=it.upload_folder_link.match(/folders\/([a-zA-Z0-9_-]+)/);
  if(!match)return;
  const folderId=match[1];
  const baseName=getItemFolderName(it);
  let newName=baseName;
  if(newStatus==='cancelled'){
    newName='【キャンセル】'+baseName;
  }
  try{
    await fetch('/api/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folderId,newName})});
  }catch(e){console.warn('Folder rename failed:',e)}
}

async function renameGroupFolder(g,isCancelled){
  if(!g||!g.drive_link)return;
  const match=g.drive_link.match(/folders\/([a-zA-Z0-9_-]+)/);
  if(!match)return;
  const folderId=match[1];
  const baseName=getGroupFolderName(g);
  const newName=isCancelled?'【キャンセル】'+baseName:baseName;
  try{
    await fetch('/api/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folderId,newName})});
  }catch(e){console.warn('Group folder rename failed:',e)}
}

async function deleteDriveFolder(g){
  if(!g||!g.drive_link)return;
  const match=g.drive_link.match(/folders\/([a-zA-Z0-9_-]+)/);
  if(!match)return;
  const folderId=match[1];
  try{
    await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folderId})});
  }catch(e){console.warn('Drive folder delete failed:',e)}
}

function mobileEditField(gid,iid,field,el,type){
  if(el.querySelector('input'))return;
  const g=groups.find(x=>x.id===gid);if(!g)return;
  const it=(g.items||[]).find(x=>x.id===iid);if(!it)return;
  const val=it[field]||'';
  const input=document.createElement('input');
  input.type=type||'text';input.value=val;
  input.style.cssText='font-size:16px;padding:8px 12px;border:1px solid var(--text-secondary);border-radius:8px;width:100%;outline:none;background:#fff;';
  if(type==='number')input.min='0';
  input.addEventListener('click',e=>{e.stopPropagation()});
  input.addEventListener('touchstart',e=>{e.stopPropagation()});
  const orig=el.innerHTML;el.innerHTML='';el.appendChild(input);
  let committed=false;
  const commit=async()=>{if(committed)return;committed=true;let v=input.value.trim();if(type==='number')v=parseInt(v)||0;if(field==='venue'&&!v){el.innerHTML=orig;return}await dbUpdateItem(iid,{[field]:v});await loadAll();const gNew=groups.find(x=>x.id===gid);const itNew=(gNew.items||[]).find(x=>x.id===iid);if(itNew)openMobileDetail(gNew,itNew,gid)};
  let composing=false;
  input.addEventListener('compositionstart',()=>{composing=true});
  input.addEventListener('compositionend',()=>{composing=false});
  input.addEventListener('blur',()=>{if(composing){setTimeout(commit,50)}else{commit()}});
  input.addEventListener('keydown',e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape'){el.innerHTML=orig}});
}

function mobileEditDate(gid,iid,field,row){

  const valEl=row.querySelector('.mobile-detail-value');
  openCal(valEl,it[field]||todayStr(),async function(val){
    await dbUpdateItem(iid,{[field]:val});await loadAll();
    const gNew=groups.find(x=>x.id===gid);const itNew=(gNew.items||[]).find(x=>x.id===iid);if(itNew)openMobileDetail(gNew,itNew,gid);
  },field==='end_date'?it.start_date:null,g.start_date,g.end_date);
}
